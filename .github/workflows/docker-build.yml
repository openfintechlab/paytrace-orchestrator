name: Docker Build Pipeline

on:
  push:
    branches: 
      - "main"
      - "develop"
      - "dev/*"
      - "feature/*"
      - "release/*"
  pull_request:
    branches: 
      - "main"
      - "develop"
      - "dev/*"
      - "feature/*"
      - "release/*"

jobs:
  determine-strategy:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - id: check
        run: |
          # If it's a Pull Request (Merge Request), it is always mandatory.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            # For a standard push to dev/*, feature/*, etc., look for the optional keyword
            if echo "${{ github.event.head_commit.message }}" | grep -q "\[build docker\]"; then
              echo "should_build=true" >> $GITHUB_OUTPUT
            else
              echo "should_build=false" >> $GITHUB_OUTPUT
            fi
          fi

  build-docker:
    needs: determine-strategy
    # Runs automatically on PRs, or on pushes containing "[build docker]"
    if: ${{ needs.determine-strategy.outputs.should_build == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false # Keeps it as a compilation/validation check only
          tags: paytrace-orchestrator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
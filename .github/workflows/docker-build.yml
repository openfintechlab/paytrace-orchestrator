name: Docker Build Pipeline

on:
  push:
    branches: 
      - "main"
      - "develop"
      - "dev/*"
      - "feature/*"
      - "release/*"
  pull_request:
    branches: 
      - "main"
      - "develop"
      - "dev/*"
      - "feature/*"
      - "release/*"

# Required permissions for repository checkout
permissions:
  contents: read

jobs:
  determine-strategy:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      should_push: ${{ steps.check.outputs.should_push }}
    steps:
      - id: check
        run: |
          # 1. Evaluate Build Intent
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif echo "${{ github.event.head_commit.message }}" | grep -q "\[build docker\]"; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

          # 2. Evaluate Push Intent (Only push on true branch merges, not active Pull Requests)
          if [ "${{ github.event_name }}" = "push" ] && { [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "develop" ] || [[ "${{ github.ref_name }}" == release/* ]]; }; then
            echo "should_push=true" >> $GITHUB_OUTPUT
          else
            echo "should_push=false" >> $GITHUB_OUTPUT
          fi

  build-and-publish:
    needs: determine-strategy
    if: ${{ needs.determine-strategy.outputs.should_build == 'true' || needs.determine-strategy.outputs.should_push == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log into Docker Hub
      - name: Log in to Docker Hub
        if: ${{ needs.determine-strategy.outputs.should_push == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and conditionally Push the image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # Pull Requests will pass 'false', Merges to main/develop will pass 'true'
          push: ${{ needs.determine-strategy.outputs.should_push }}
          tags: |
            openfintechlab/paytrace-orchestrator:latest
            openfintechlab/paytrace-orchestrator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
